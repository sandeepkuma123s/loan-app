<!DOCTYPE html>
<html>
<head>
    <title>Loan Prediction</title>

    <style>
        /* ===== BACKGROUND ===== */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url("https://images.unsplash.com/photo-1554224155-8d04cb21cd6c") no-repeat center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        /* ===== CARD ===== */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 15px;
            width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header img {
            width: 60px;
        }

        .header h2 {
            margin: 10px 0 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        /* ===== FORM GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Inputs */
        input, select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 100%;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        /* Button */
        button {
            grid-column: span 2;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        /* Result */
        .result {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">
        <h2>Loan Prediction</h2>
        <p>Check loan approval instantly</p>
    </div>

    <!-- FORM -->
    <form action="/predict" method="post">
        <div class="grid">

            <input type="number" name="ApplicantIncome" placeholder="Applicant Income" required>
            <input type="number" name="CoapplicantIncome" placeholder="Coapplicant Income" required>

            <input type="number" name="LoanAmount" placeholder="Loan Amount" required>
            <input type="number" name="Loan_Amount_Term" placeholder="Loan Term" required>

            <select name="Credit_History">
                <option value="">Credit History</option>
                <option value="1">Good</option>
                <option value="0">Bad</option>
            </select>

            <select name="Gender_Male">
                <option value="">Gender</option>
                <option value="1">Male</option>
                <option value="0">Female</option>
            </select>

            <select name="Married_Yes">
                <option value="">Married</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="Education_Not_Graduate">
                <option value="">Education</option>
                <option value="0">Graduate</option>
                <option value="1">Not Graduate</option>
            </select>

            <select name="Self_Employed_Yes">
                <option value="">Self Employed</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="Property_Area_Semiurban">
                <option value="0">Semiurban</option>
                <option value="1">Yes</option>
            </select>

            <select name="Property_Area_Urban">
                <option value="0">Urban</option>
                <option value="1">Yes</option>
            </select>

            <select name="Dependents_1">
                <option value="0">Dependents 1</option>
                <option value="1">Yes</option>
            </select>

            <select name="Dependents_2">
                <option value="0">Dependents 2</option>
                <option value="1">Yes</option>
            </select>

            <select name="Dependents_3">
                <option value="0">Dependents 3+</option>
                <option value="1">Yes</option>
            </select>

            <button type="submit">Predict</button>
        </div>
    </form>

    <!-- RESULT -->
    <div class="result">
        {{ prediction_text }}
    </div>

</div>

</body>
</html>
